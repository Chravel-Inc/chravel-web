# Gitleaks configuration for Chravel
# Docs: https://github.com/gitleaks/gitleaks
#
# Run locally (git mode — matches CI):
#   gitleaks detect --source . --config .gitleaks.toml
#
# Run locally (filesystem scan — run from a clean working tree, not after npm run build):
#   gitleaks detect --source . --config .gitleaks.toml --no-git
#
# NOTE: In gitleaks v8, global [[allowlists]] paths do NOT suppress built-in rules.
# Use .gitleaksignore for committed false positives; [rules.allowlist] for custom rules.
# Running --no-git after `npm run build` will show 1 residual finding for the built-in
# `jwt` rule matching the Supabase anon key in the dist/ bundle (gitignored, expected).

title = "Chravel Secret Scanner"

[extend]
# Use the official Gitleaks default ruleset as a base
useDefault = true

[[allowlists]]
  description = "Ignore example/placeholder files, test fixtures, and Fastlane config"
  paths = [
    ".*\\.env\\.example$",
    ".*\\.env\\.production\\.example$",
    ".*\\.test\\.tsx?$",
    ".*\\.spec\\.tsx?$",
    ".*__snapshots__.*",
    ".*\\.d\\.ts$",
    "ios-release/fastlane/.*",
    "appstore/UPLOAD_GUIDE\\.md",
    "src/integrations/supabase/client\\.ts$",
    "docs/.*\\.md$",
    "supabase/migrations/.*\\.sql$",
    # Lock files (SHA hashes trigger generic-api-key)
    ".*\\.lock$",
    # Test fixtures and scripts
    "scripts/__tests__/.*",
    # iOS: only the specific files with known false positives (public client keys)
    # Do NOT use ios/.* — it would blind CI to real secrets in the native tree.
    "ios/App/App/AppDelegate\\.swift$",
    "ios/App/App/RevenueCat/README\\.md$",
    # Edge function READMEs with example curl commands
    "supabase/functions/.*/README\\.md$",
    # .well-known files contain public-by-design identifiers (Team ID, SHA-256 fingerprints)
    '''public/\.well-known/assetlinks\.json''',
    '''public/\.well-known/apple-app-site-association''',
  ]
  regexes = [
    # Placeholder patterns that are not real keys
    "your-.*-key",
    "your_.*_key",
    "sk_live_xxx",
    "sk_live_your",
    "pk_live_your",
    "pk_test_stub",
    "whsec_your",
    "re_your",
  ]

[[rules]]
  description = "Supabase anon key hardcoded in source"
  id = "supabase-anon-key-hardcoded"
  regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'''
  tags = ["supabase", "jwt", "key"]
  [rules.allowlist]
    # Note: global [[allowlists]] paths do not suppress custom rules in gitleaks v8.
    # Add per-rule path exemptions here; use .gitleaksignore for committed false positives.
    paths = [
      ".*\\.env\\.example$",
      ".*\\.env\\.production\\.example$",
      # dist/ is gitignored build output; suppress local-only --no-git false positives
      "dist",
    ]

[[rules]]
  description = "RevenueCat API key hardcoded"
  id = "revenuecat-key"
  regex = '''(appl_|test_)[A-Za-z0-9]{20,}'''
  tags = ["revenuecat", "key"]
  [rules.allowlist]
    paths = [".*\\.env\\.example$", ".*\\.env\\.production\\.example$"]

name: Deploy LiveKit Voice Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'agent/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install LiveKit CLI
        run: |
          LK_VERSION=$(curl -s https://api.github.com/repos/livekit/livekit-cli/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          curl -sSL -o /tmp/lk.tar.gz "https://github.com/livekit/livekit-cli/releases/download/v${LK_VERSION}/lk_${LK_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/lk.tar.gz -C /tmp/
          sudo mv /tmp/lk /usr/local/bin/lk
          lk --version

      - name: Deploy to LiveKit Cloud
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          lk agent deploy ../ --yes

      - name: Deployment summary
        run: |
          echo "## LiveKit Voice Agent Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Agent**: chravel-voice" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        # Scan current working tree (not git history). This catches new secrets
        # introduced in the branch without being blocked by pre-existing findings.
        # Known false positives are suppressed via .gitleaksignore (file:rule:line format).
        run: gitleaks detect --source . --config .gitleaks.toml --no-git
